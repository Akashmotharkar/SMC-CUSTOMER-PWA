<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PWA Icon Generator</title>

<style>
body{
    font-family:Arial,sans-serif;
    text-align:center;
    padding:40px;
    background:#f5f5f5;
}
button{
    padding:15px 35px;
    font-size:18px;
    cursor:pointer;
}
canvas{
    display:none;
}
</style>

</head>
<body>

<h2>PWA Icon Generator</h2>

<p>
Generates all required PWA icons.
</p>

<button onclick="generateIcons()">
Generate Icons
</button>

<canvas id="canvas"></canvas>

<script>

const sizes=[
72,
96,
128,
144,
152,
192,
384,
512
];

function drawIcon(size){

const canvas=
document.getElementById("canvas");

canvas.width=size;
canvas.height=size;

const ctx=
canvas.getContext("2d");

/* Background */

ctx.fillStyle="#6200ea";

roundRect(
ctx,
0,
0,
size,
size,
size*0.22
);

ctx.fill();

/* White circle */

ctx.beginPath();

ctx.arc(
size/2,
size/2,
size*0.32,
0,
Math.PI*2
);

ctx.fillStyle="#ffffff";
ctx.fill();

/* MC */

ctx.fillStyle="#6200ea";

ctx.font=
"bold "+
(size*0.23)+
"px Arial";

ctx.textAlign="center";
ctx.textBaseline="middle";

ctx.fillText(
"MC",
size/2,
size/2
);

return canvas;

}

function roundRect(
ctx,
x,
y,
w,
h,
r
){

ctx.beginPath();

ctx.moveTo(x+r,y);

ctx.arcTo(
x+w,
y,
x+w,
y+h,
r
);

ctx.arcTo(
x+w,
y+h,
x,
y+h,
r
);

ctx.arcTo(
x,
y+h,
x,
y,
r
);

ctx.arcTo(
x,
y,
x+w,
y,
r
);

ctx.closePath();

}

function downloadCanvas(
canvas,
filename
){

const link=
document.createElement("a");

link.download=filename;

link.href=
canvas.toDataURL("image/png");

link.click();

}

function generateIcons(){

sizes.forEach(function(size){

const canvas=
drawIcon(size);

downloadCanvas(
canvas,
"icon-"+size+".png"
);

});

alert(
"All icons generated."
);

}

</script>

</body>
</html>
